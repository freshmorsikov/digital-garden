<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Core Qualities</title>
  <link rel="icon" href="../../res/favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d14;
      --text: #f3f2f9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      letter-spacing: -0.05em;
    }
  </style>
</head>
<body>
  <h1>Core Qualities</h1>
</body>
</html>
