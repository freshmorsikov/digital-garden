<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing</title>
  <link rel="icon" href="../res/favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg: #161821;
      --bg-soft: #1f2330;
      --panel: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f5f7ff;
      --muted: #a9b0c7;
      --accent: #7da2ff;
      --max-width: 760px;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Poppins", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(125, 162, 255, 0.15), transparent 24%),
        linear-gradient(180deg, #11131a 0%, var(--bg) 100%);
      line-height: 1.7;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page-shell {
      width: min(100% - 1.5rem, var(--max-width));
      margin: 0 auto;
      padding: 2rem 0 4rem;
    }

    .topbar {
      margin-bottom: 2rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
    }

    .article-shell {
      padding: 1.75rem;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.025));
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0 0 0.75rem;
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1, h2, h3 {
      margin-top: 0;
      letter-spacing: -0.04em;
      line-height: 1.1;
    }

    h1 {
      margin-bottom: 1.25rem;
      font-size: clamp(2.4rem, 8vw, 4rem);
    }

    h2 {
      margin: 2rem 0 0.85rem;
      font-size: clamp(1.5rem, 4vw, 2rem);
    }

    p, ul, ol, blockquote {
      margin: 0 0 1rem;
      color: var(--muted);
    }

    ul, ol {
      padding-left: 1.25rem;
    }

    li + li {
      margin-top: 0.45rem;
    }

    code {
      padding: 0.15rem 0.35rem;
      border-radius: 0.4rem;
      background: rgba(125, 162, 255, 0.12);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.95em;
    }

    pre {
      overflow-x: auto;
      padding: 1rem;
      border-radius: 16px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
    }

    pre code {
      padding: 0;
      background: transparent;
    }

    blockquote {
      padding-left: 1rem;
      border-left: 3px solid rgba(125, 162, 255, 0.55);
    }

    .status {
      color: var(--muted);
    }

    @media (min-width: 700px) {
      .page-shell {
        padding-top: 2.5rem;
      }

      .article-shell {
        padding: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <div class="topbar">
      <a class="back-link" href="../">Back to home</a>
    </div>

    <article class="article-shell">
      <p class="eyebrow">Writing</p>
      <div id="content" class="status">Loading post...</div>
    </article>
  </main>

  <script>
    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderInlineMarkdown(text) {
      return text
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    }

    function markdownToHtml(markdown) {
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      const html = [];
      let inList = false;
      let inCodeBlock = false;
      let paragraph = [];

      function flushParagraph() {
        if (paragraph.length === 0) {
          return;
        }

        html.push("<p>" + renderInlineMarkdown(paragraph.join(" ")) + "</p>");
        paragraph = [];
      }

      function closeList() {
        if (inList) {
          html.push("</ul>");
          inList = false;
        }
      }

      for (const line of lines) {
        if (line.startsWith("```")) {
          closeList();
          flushParagraph();
          if (inCodeBlock) {
            html.push("</code></pre>");
          } else {
            html.push("<pre><code>");
          }
          inCodeBlock = !inCodeBlock;
          continue;
        }

        if (inCodeBlock) {
          html.push(escapeHtml(line) + "\n");
          continue;
        }

        if (!line.trim()) {
          closeList();
          flushParagraph();
          continue;
        }

        if (line.startsWith("# ")) {
          closeList();
          flushParagraph();
          html.push("<h1>" + renderInlineMarkdown(line.slice(2).trim()) + "</h1>");
          continue;
        }

        if (line.startsWith("## ")) {
          closeList();
          flushParagraph();
          html.push("<h2>" + renderInlineMarkdown(line.slice(3).trim()) + "</h2>");
          continue;
        }

        if (line.startsWith("### ")) {
          closeList();
          flushParagraph();
          html.push("<h3>" + renderInlineMarkdown(line.slice(4).trim()) + "</h3>");
          continue;
        }

        if (line.startsWith("> ")) {
          closeList();
          flushParagraph();
          html.push("<blockquote>" + renderInlineMarkdown(line.slice(2).trim()) + "</blockquote>");
          continue;
        }

        if (line.startsWith("- ")) {
          flushParagraph();
          if (!inList) {
            html.push("<ul>");
            inList = true;
          }
          html.push("<li>" + renderInlineMarkdown(line.slice(2).trim()) + "</li>");
          continue;
        }

        closeList();
        paragraph.push(line.trim());
      }

      closeList();
      flushParagraph();

      return html.join("");
    }

    async function loadPost() {
      const content = document.getElementById("content");
      const slug = new URLSearchParams(window.location.search).get("post");

      if (!slug || !/^[a-z0-9-]+$/.test(slug)) {
        document.title = "Writing";
        content.textContent = "Select a writing piece from the homepage.";
        return;
      }

      try {
        const response = await fetch("./" + slug + ".md");

        if (!response.ok) {
          throw new Error("Unable to load post");
        }

        const markdown = await response.text();
        const titleMatch = markdown.match(/^#\s+(.+)$/m);

        document.title = titleMatch ? titleMatch[1] + " | Writing" : "Writing";
        content.innerHTML = markdownToHtml(markdown);
      } catch (error) {
        document.title = "Writing";
        content.textContent = "This post could not be loaded.";
      }
    }

    loadPost();
  </script>
</body>
</html>
